<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 80" role="img" aria-label="GoBrain – Trening Słuchowy">
  <!-- HEAD SILHOUETTE: profile facing left, fills approx x:0–76, y:0–80 -->
  <path
    d="M50,5
       C64,5 72,17 72,34
       C72,51 63,65 58,69
       L44,76 L30,76 L32,66
       C21,62 14,53 12,45
       C9,34 12,20 20,13
       C27,7 38,4 50,5 Z"
    fill="#0066cc"
  />

  <!-- WHITE BRAIN ELLIPSE inside head -->
  <ellipse cx="44" cy="38" rx="20" ry="17" fill="white" />

  <!-- BRAIN SULCI (subtle folds) -->
  <path d="M30,36 C33,32 38,34 44,38"
        fill="none" stroke="#b3d4f0" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M44,38 C50,34 55,36 58,40"
        fill="none" stroke="#b3d4f0" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M31,44 C35,40 40,42 44,46"
        fill="none" stroke="#b3d4f0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- LIGHTBULB inside brain -->
  <!-- Bulb body -->
  <path
    d="M38,30
       C36.5,34.5 36,39 36.5,43
       L51.5,43
       C52,39 51.5,34.5 50,30
       C48.5,27 39.5,27 38,30 Z"
    fill="#0066cc"
  />
  <!-- Cap lines -->
  <rect x="36.5" y="43" width="15" height="2.5" rx="1.25" fill="#0066cc"/>
  <rect x="38"   y="46" width="12" height="2.5" rx="1.25" fill="#0066cc"/>

  <!-- SPARK RAYS above bulb -->
  <line x1="44" y1="25"  x2="44" y2="22"  stroke="#0066cc" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="49" y1="27"  x2="51" y2="24"  stroke="#0066cc" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="39" y1="27"  x2="37" y2="24"  stroke="#0066cc" stroke-width="1.4" stroke-linecap="round"/>

  <!-- TEXT: "Go" in primary blue -->
  <text
    x="86" y="54"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="45"
    fill="#0066cc"
    letter-spacing="-2"
  >Go</text>

  <!-- TEXT: "Brain" in near-black -->
  <text
    x="137" y="54"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="45"
    fill="#0d1117"
    letter-spacing="-2"
  >Brain</text>
</svg>
